<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>휘찬의 AI 포트폴리오</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body { margin: 0; padding: 0; background-color: transparent; overflow: hidden; font-family: sans-serif; }
        
        /* 슬라이더 영역 */
        .swiper { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; }

        /* 하단 질문 입력창 - z-index를 가장 높게 설정 */
        #chat-box {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 999999 !important; /* 버튜버보다 무조건 앞에 오게 함 */
            display: flex; gap: 10px;
            background: rgba(255, 255, 255, 0.9); padding: 12px;
            border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            width: 85%; max-width: 450px; 
            backdrop-filter: blur(5px);
            pointer-events: auto !important; /* 클릭 차단 방지 */
        }
        #chat-box input {
            flex: 1; border: 1px solid #ccc; padding: 10px; border-radius: 6px; outline: none; font-size: 16px;
        }
        #chat-box button {
            background: #007aff; color: white; border: none; padding: 10px 20px;
            border-radius: 6px; cursor: pointer; font-weight: bold;
        }
