<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>휘찬의 AI 포트폴리오</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <style>
        body { margin: 0; padding: 0; background-color: #000; overflow: hidden; font-family: 'Pretendard', sans-serif; }
        
        /* 슬라이더 (배경) */
        .swiper { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        .swiper-slide img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.7); }

        /* 입력창 영역 */
        #chat-box {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            z-index: 9999; 
            background: rgba(255, 255, 255, 0.9); padding: 8px 15px;
            border-radius: 40px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 85%; max-width: 450px; 
            display: flex; align-items: center; justify-content: space-between;
            backdrop-filter: blur(5px);
        }
        
        #userInput { 
            width: 80%; border: none; outline: none; font-size: 16px; 
            background: transparent; padding: 10px;
        }

        /* 질문 버튼 추가 */
        #sendBtn {
            width: 40px; height: 40px; border: none; background: #333;
            color: white; border-radius: 50%; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.3s;
        }
        #sendBtn:hover { background: #555; }

        /* 버튜버 위젯 설정 - 말풍선은 클릭 가능하게 수정 */
        #live2d-widget { pointer-events: none; } /* 위젯 자체는 관통 */
        #live2d-widget .live2d-widget-dialog-container { pointer-events: auto; } /* 대화창은 클릭 가능 */
        canvas#live2dcanvas { pointer-events: none; } /* 캐릭터 모델만 클릭 관통 */
    </style>
</head>
<body>

    <div class="swiper">
        <div class="swiper-wrapper">
            <div class="swiper-slide"><img src="https://via.placeholder.com/800x1200?text=사진1:+서울대+공연"></div>
            <div class="swiper-slide"><img src="https://via.placeholder.com/800x1200?text=사진2:+학생회+활동"></div>
            <div class="swiper-slide"><img src="https://via.placeholder.com/800x1200?text=사진3:+IT+프로젝트"></div>
        </div>
        <div class="swiper-button-next" style="color:white; z-index: 10;"></div>
        <div class="swiper-button-prev" style="color:white; z-index: 10;"></div>
    </div>

    <div id="chat-box">
        <input type="text" id="userInput" placeholder="휘찬님에 대해 물어보세요!" autocomplete="off" />
        <button id="sendBtn">➤</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/live2d-widget@3.1.4/lib/L2Dwidget.min.js"></script>

    <script>
        // 버튜버 초기화
        L2Dwidget.init({
            "model": { "jsonPath": "https://cdn.jsdelivr.net/gh/evrstr/live2d-widget-models/live2d_evrstr/koharu/model.json" },
            "display": { "position": "right", "width": 150, "height": 300, "hOffset": 10, "vOffset": 0 },
            "mobile": { "show": true },
            "dialog": { "enable": true, "script": { 'every idle 10s': '궁금한 점이 있으면 물어봐!' } }
        });

        // 슬라이더 텍스트 설정
        const descriptions = ["🎻 서울대 음대 기악과 공연!", "💼 학생회 사무부국장 활동!", "💻 IT 융합 프로젝트!"];
        const swiper = new Swiper('.swiper', {
            loop: true,
            navigation: { nextEl: '.swiper-button-next', prevEl: '.swiper-button-prev' },
            on: { slideChangeTransitionEnd: function() { L2Dwidget.showTextMessage(descriptions[this.realIndex], 3000); } }
        });

        // 질문 처리 함수
        function handleQuery() {
            const input = document.getElementById('userInput');
            const query = input.value.trim();
            if(!query) return;

            let reply = `'${query}'에 대해 궁금하시군요!`;
            
            if(query.includes("대학") || query.includes("학교")) {
                reply = "윤휘찬님은 **서울대학교 음악대학**에 재학 중입니다! 🎓";
            } else if(query.includes("전공") || query.includes("악기")) {
                reply = "현재 **현악**을 전공하고 있어요! 🎻";
            } else if(query.includes("학생회")) {
                reply = "음대 학생회 **사무부국장**으로 활동하며 행정을 혁신했습니다! 💼";
            } else if(query.includes("안녕")) {
                reply = "안녕하세요! 휘찬님의 AI 비서입니다. 😊";
            }

            L2Dwidget.showTextMessage(reply, 5000);
            input.value = ""; 
        }

        // 1. 엔터키 감지
        document.getElementById('userInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                handleQuery();
            }
        });

        // 2. 버튼 클릭 감지
        document.getElementById('sendBtn').addEventListener('click', function() {
            handleQuery();
        });
    </script>
</body>
</html>
